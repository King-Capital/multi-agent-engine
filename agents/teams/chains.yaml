chains:
  plan-build-review:
    description: "Full development workflow: plan, implement, validate"
    steps:
      - team: Planning
        till_done:
          - "Implementation plan produced with files, risks, and steps"
          - "All relevant files read and understood"
      - team: Engineering
        till_done:
          - "All code changes implemented per plan"
          - "Tests pass"
          - "Build succeeds"
      - deterministic:
          command: "bun tsc --noEmit 2>&1 || go build -o /dev/null . 2>&1 || echo 'No lint configured'"
          label: "Type check / build verification"
          on_failure: loop
          max_retries: 1
      - team: Validation
        till_done:
          - text: "Code reviewed — grade assigned"
            type: output_match
            verify: "GRADE:\\s*(PASS|FEEDBACK|FAILED)"
          - "Security reviewed — no P0/P1 vulnerabilities"
          - "All corrections applied or escalated"

  scout-then-plan:
    description: "Explore first, then produce a plan"
    steps:
      - agent: Scout
        till_done:
          - "Codebase mapped"
          - "Key files identified"
          - "Dependencies documented"
      - team: Planning
        till_done:
          - "Plan produced based on scout findings"

  build-verify:
    description: "Builder-verifier loop with 3-attempt escalation"
    steps:
      - team: Engineering
        till_done:
          - "Code changes implemented"
      - deterministic:
          command: "bun tsc --noEmit 2>&1 || go build -o /dev/null . 2>&1 || echo 'No lint configured'"
          label: "Type check / build verification"
          on_failure: loop
          max_retries: 1
      - team: Validation
        till_done:
          - "Code reviewed and graded"
        on_feedback:
          retry_team: Engineering
          max_attempts: 3
          escalate_to: user

  parallel-build:
    description: "Same task, multiple model families, best result wins"
    parallel:
      - team: Engineering
      - team: Engineering B
    then:
      - team: Validation
        till_done:
          - "Both implementations reviewed"
          - "Best implementation selected"
          - "Winner verified"

  review-only:
    description: "Full parallel review: red team + blue team + validation"
    steps:
      - parallel:
          - team: Red Team
          - team: Blue Team
          - team: Validation
        till_done:
          - "Red team adversarial + security review complete"
          - "Blue team correctness + quality review complete"
          - "Validation code review + grade assigned"
          - "All findings graded P0-P3"

  full-sdlc:
    description: "Complete SDLC: scout, plan, build in parallel, validate, fix, re-validate"
    steps:
      - agent: Scout
        till_done:
          - "Codebase explored and mapped"
      - team: Planning
        till_done:
          - "Implementation plan with files and risks"
      - parallel:
          - team: Engineering
          - team: Engineering B
      - parallel:
          - team: Validation
          - team: Validation B
        till_done:
          - "Both builds reviewed by both validation teams"
          - "Best build selected"
          - "All P0/P1 issues resolved"

  # --- Design Chains ---

  design-review:
    description: "Scout existing UI, design improvements, validate accessibility + visual quality"
    steps:
      - agent: Scout
        till_done:
          - "Existing UI files mapped"
          - "Current design system documented (colors, fonts, spacing)"
          - "Key improvement areas identified"
      - team: Design
        till_done:
          - "Design variants produced as self-contained HTML files"
          - "Design tokens and rationale documented"
          - "Accessibility checks passed (contrast, focus, semantics)"
      - team: Validation
        till_done:
          - text: "Design review grade assigned"
            type: output_match
            verify: "GRADE:\\s*(PASS|FEEDBACK|FAILED)"
          - "Visual consistency verified"
          - "Responsive behavior validated"

  design-build:
    description: "Design first, then implement in code, then validate"
    steps:
      - team: Design
        till_done:
          - "Design variants produced"
          - "Final variant selected with rationale"
      - team: Engineering
        till_done:
          - "Selected design implemented in components"
          - "Tests pass"
          - "Build succeeds"
      - deterministic:
          command: "bun tsc --noEmit 2>&1 || echo 'No lint configured'"
          label: "Type check verification"
          on_failure: loop
          max_retries: 1
      - team: Validation
        till_done:
          - "Implementation matches design"
          - "Accessibility verified"
          - "Code quality reviewed"

  # --- Swarm Chains ---

  standard-swarm:
    description: "5-squad parallel review swarm: orchestrator assigns paths, leads spin out full workforce immediately"
    steps:
      - team: Architecture Coordination
        system_prompt_append: |
          ARCH COORDINATOR MODE: Produce the swarm coordination brief before any SME squad begins.
          Identify the files, components, and risk areas each SME squad must cover.
          Assign coverage for Correctness, Adversarial, Quality, Security, and Domain squads.
          Call out expected worker roles, any required deterministic checks, and gaps that need follow-up.
          Your final line MUST be exactly: SWARM_COORDINATION_READY
          Do not put checklist syntax, bullets, or commentary after that final marker.
        till_done:
          - type: output_match
            text: "Arch coordinator produced the SME squad coverage plan"
            verify: "SWARM_COORDINATION_READY"
      - parallel:
          - team: Correctness Squad
            system_prompt_append: |
              Use the Arch Coordinator brief in the previous context as the coverage contract.
              SWARM MODE: Brief ALL workers immediately with specific file assignments.
              Stream progress: after briefing, report "Briefed N workers on [files]" so the dashboard shows activity.
              As workers report back, summarize each finding to the conversation — keep the user informed in real-time.
              Synthesize all findings into a graded P0-P3 report. Track which files were covered.
          - team: Adversarial Squad
            system_prompt_append: |
              Use the Arch Coordinator brief in the previous context as the coverage contract.
              SWARM MODE: Brief ALL workers immediately — each attacks different files from different angles.
              Stream progress: report who's working on what as you brief them.
              As workers find issues, relay findings immediately — don't wait for all to finish.
              Synthesize into prioritized attack report with P0-P3 severity.
          - team: Quality Squad
            system_prompt_append: |
              Use the Arch Coordinator brief in the previous context as the coverage contract.
              SWARM MODE: Brief ALL workers immediately — each reviews a different quality dimension.
              Stream progress: report assignments and worker status as they complete.
              Relay findings as they come in so the dashboard shows real-time quality assessment.
              Synthesize into actionable quality report with P0-P3 severity.
          - team: Security Squad
            system_prompt_append: |
              Use the Arch Coordinator brief in the previous context as the coverage contract.
              SWARM MODE: Brief ALL workers immediately — each checks different OWASP categories on specific files.
              Stream progress: report who's auditing what. Any file with user input, URLs, or file paths must be covered.
              Relay security findings immediately as workers report — don't batch.
              Synthesize into security audit with P0-P3 + CWE codes. End with verification checklist.
          - team: Domain Squad
            system_prompt_append: |
              Use the Arch Coordinator brief in the previous context as the coverage contract.
              SWARM MODE: Brief ALL workers immediately — backend, frontend, data, integration, infra, security-domain.
              Stream progress: report assignments and relay findings as workers complete.
              Cross-reference across workers — if two workers disagree, note the conflict.
              Synthesize into domain fitness report with P0-P3 severity.
        till_done:
          - type: output_match
            text: "Correctness squad reported with evidence"
            verify: "Correctness (Squad|squad|Lead|Reviewer|reviewer)"
          - type: output_match
            text: "Adversarial squad reported with evidence"
            verify: "Adversarial (Squad|squad|Lead|Reviewer|reviewer)"
          - type: output_match
            text: "Quality squad reported with evidence"
            verify: "Quality (Squad|squad|Lead|Reviewer|reviewer)"
          - type: output_match
            text: "Security squad reported with evidence"
            verify: "Security (Squad|squad|Lead|Reviewer|reviewer)"
          - type: output_match
            text: "Domain squad reported with evidence"
            verify: "Domain (Squad|squad|Lead|Reviewer|reviewer)"
          - type: output_match
            text: "All findings graded P0-P3 with evidence"
            verify: "P[0-3]|P0|P1|P2|P3"
          - type: output_match
            text: "Orchestrator synthesizes across all 5 squads"
            verify: "synthesi[sz]e|SYNTHESIS|Synthesis|Orchestrator"

  swarm-review:
    description: "Full review swarm: red team + blue team in parallel, orchestrator synthesizes"
    steps:
      - parallel:
          - team: Red Team
          - team: Blue Team
        till_done:
          - "Red team adversarial + security review complete"
          - "Blue team correctness + quality review complete"
          - "All findings graded P0-P3"
          - "Orchestrator synthesizes conflicting findings"

  red-blue:
    description: "Red team attacks, blue team defends — competing perspectives"
    steps:
      - team: Red Team
        till_done:
          - "Attack surface mapped"
          - "Adversarial findings with exploit paths"
          - "Security vulnerabilities with CWE codes"
      - team: Blue Team
        till_done:
          - "Red team findings validated or disputed"
          - "Correctness claims verified deterministically"
          - "Quality assessment with maintainability score"
          - "Final synthesis: which red team findings are real"

  scout-swarm:
    description: "Scout first, then full swarm review on flagged areas only"
    steps:
      - agent: Scout
        till_done:
          - "Codebase mapped"
          - "Risk areas identified"
          - "Files prioritized for review"
      - parallel:
          - team: Red Team
          - team: Blue Team
        till_done:
          - "Flagged files reviewed from both perspectives"
          - "Findings synthesized"

  build-then-swarm:
    description: "Build with engineering, then swarm review the output"
    steps:
      - team: Planning
        till_done:
          - "Implementation plan produced"
      - team: Engineering
        till_done:
          - "Code changes implemented"
          - "Tests pass"
      - deterministic:
          command: "bun tsc --noEmit 2>&1 || go build -o /dev/null . 2>&1 || echo 'No lint configured'"
          label: "Type check / build verification"
          on_failure: loop
          max_retries: 1
      - parallel:
          - team: Red Team
          - team: Blue Team
        till_done:
          - "Built code reviewed from both perspectives"
          - "All P0/P1 issues flagged"
        on_feedback:
          retry_team: Engineering
          max_attempts: 3
          escalate_to: user

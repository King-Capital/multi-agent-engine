orchestrator:
  name: Orchestrator
  path: agents/personas/orchestrator.md
  model: quality
  color: "#36f9f6"

teams:
  - team-name: Planning
    team-color: "#ffd93d"
    consult-when: >
      Analyzing codebases, producing implementation plans, exploring
      file structures, mapping dependencies, assessing risks.
    lead:
      name: Planning Lead
      path: agents/personas/planner.md
      model: quality
      color: "#ffd93d"
    members:
      - name: Scout
        path: agents/personas/scout.md
        model: fast
        color: "#ffd93d"
        consult-when: >
          Fast codebase exploration, file discovery, dependency mapping,
          quick triage of large codebases.

  - team-name: Engineering
    team-color: "#00d4ff"
    consult-when: >
      Writing code, implementing features, fixing bugs, building
      infrastructure, creating new files, modifying existing code.
    lead:
      name: Engineering Lead
      path: agents/personas/planner.md
      model: quality
      color: "#00d4ff"
    members:
      - name: Builder Alpha
        path: agents/personas/builder.md
        model: main
        color: "#00d4ff"
        consult-when: >
          Primary builder. Code implementation, file creation, editing,
          running builds and tests.
      - name: Builder Beta
        path: agents/personas/builder.md
        model: quality
        color: "#00b4d8"
        consult-when: >
          Secondary builder. Parallel implementation, handles independent
          fixes and changes simultaneously.
      - name: Builder Gamma
        path: agents/personas/builder.md
        model: main
        color: "#0090b0"
        consult-when: >
          Tertiary builder. Additional parallelism for large fix sets,
          docs, config, and infrastructure changes.

  - team-name: Engineering B
    team-color: "#00d4ff"
    consult-when: >
      Parallel code implementation with a different model family
      for cross-model redundancy.
    lead:
      name: Engineering Lead (B)
      path: agents/personas/planner.md
      model: pro
      color: "#00d4ff"
    members:
      - name: Builder (B)
        path: agents/personas/builder.md
        model: pro
        color: "#00b4d8"
        consult-when: >
          Same task as primary builder but using Gemini model family.

  - team-name: Validation
    team-color: "#ff6b9d"
    consult-when: >
      Code review, security review, QA testing, verifying implementations
      against requirements, grading code quality.
    lead:
      name: Validation Lead
      path: agents/personas/validator.md
      model: quality
      color: "#ff6b9d"
    members:
      - name: Code Reviewer
        path: agents/personas/reviewer.md
        model: quality
        color: "#ff6b9d"
        consult-when: >
          Code correctness review, quality checks, P0-P3 severity
          grading, atomic claim verification.
      - name: Security Reviewer
        path: agents/personas/red-team.md
        model: quality
        color: "#ff4466"
        consult-when: >
          OWASP checks, prompt injection, command injection, credential
          leaks, domain escape, config-as-execution attacks.

  - team-name: Validation B
    team-color: "#ff6b9d"
    consult-when: >
      Parallel validation with different model for cross-model verification.
    lead:
      name: Validation Lead (B)
      path: agents/personas/validator.md
      model: pro
      color: "#ff6b9d"
    members:
      - name: Code Reviewer (B)
        path: agents/personas/reviewer.md
        model: pro
        color: "#ff6b9d"
        consult-when: >
          Same review scope using Gemini model family for cross-model validation.

  # --- Swarm Teams (Review) ---

  - team-name: Red Team
    team-color: "#ff4466"
    consult-when: >
      Adversarial review, security testing, attack surface analysis,
      finding what others miss, breaking assumptions.
    lead:
      name: Validation Lead
      path: agents/personas/validator.md
      model: quality
      color: "#ff4466"
    members:
      - name: Adversarial Reviewer
        path: agents/personas/adversarial-reviewer.md
        model: quality
        color: "#ff2244"
        consult-when: >
          Devil's advocate review, assumption challenging, attack vector
          identification, edge case discovery.
      - name: Security Reviewer
        path: agents/personas/red-team.md
        model: quality
        color: "#ff4466"
        consult-when: >
          OWASP, injection, credential leaks, domain escape, prompt injection.

  - team-name: Blue Team
    team-color: "#4488ff"
    consult-when: >
      Correctness verification, quality review, maintainability assessment,
      deterministic claim validation.
    lead:
      name: Validation Lead (B)
      path: agents/personas/validator.md
      model: pro
      color: "#4488ff"
    members:
      - name: Correctness Reviewer
        path: agents/personas/correctness-reviewer.md
        model: quality
        color: "#4488ff"
        consult-when: >
          Atomic claim verification, deterministic checks, type safety,
          edge case coverage, spec compliance.
      - name: Quality Reviewer
        path: agents/personas/quality-reviewer.md
        model: pro
        color: "#66aaff"
        consult-when: >
          Maintainability, naming, structure, duplication, dead code,
          test quality, readability.

  # --- Specialized Coding Teams (Issue #139) ---
  # Use these for full-stack feature development where each domain
  # needs its own lead managing focused workers.

  - team-name: Frontend
    team-color: "#7c3aed"
    consult-when: >
      React/Next.js components, client-side state, forms, validation,
      styling, responsive design, accessibility, UI performance.
    lead:
      name: Frontend Lead
      path: prompts/roles/leads/frontend.md
      model: quality
      color: "#7c3aed"
    members:
      - name: UI Builder
        path: agents/personas/builder.md
        model: main
        color: "#8b5cf6"
        consult-when: >
          React components, hooks, forms, client-side routing,
          component composition, state management.
      - name: Styling Worker
        path: agents/personas/builder.md
        model: fast
        color: "#a78bfa"
        consult-when: >
          CSS/Tailwind, responsive layouts, animations, design system
          tokens, dark mode, component variants.

  - team-name: Backend
    team-color: "#059669"
    consult-when: >
      API routes, database schema, migrations, business logic,
      authentication, authorization, data validation, server-side.
    lead:
      name: Backend Lead
      path: prompts/roles/leads/backend.md
      model: quality
      color: "#059669"
    members:
      - name: API Builder
        path: agents/personas/builder.md
        model: main
        color: "#10b981"
        consult-when: >
          REST/GraphQL routes, middleware, request validation,
          response formatting, error handling, rate limiting.
      - name: DB Worker
        path: agents/personas/builder.md
        model: main
        color: "#34d399"
        consult-when: >
          Schema definitions, migrations, query optimization,
          indexes, data modeling, seed data.

  - team-name: Systems
    team-color: "#d97706"
    consult-when: >
      Infrastructure, Docker, CI/CD, networking, deployment,
      monitoring, logging, secrets management, LXC/VM setup.
    lead:
      name: Systems Lead
      path: prompts/roles/leads/systems.md
      model: quality
      color: "#d97706"
    members:
      - name: Infra Worker
        path: agents/personas/builder.md
        model: main
        color: "#f59e0b"
        consult-when: >
          Dockerfiles, docker-compose, Ansible playbooks, systemd units,
          Caddy/Nginx configs, LXC templates, networking.
      - name: CI/CD Worker
        path: agents/personas/builder.md
        model: fast
        color: "#fbbf24"
        consult-when: >
          GitHub Actions workflows, build scripts, test pipelines,
          deployment automation, artifact management.

  - team-name: Security Review
    team-color: "#dc2626"
    consult-when: >
      Security audit, vulnerability assessment, input validation review,
      authentication flow review, OWASP compliance, dependency scanning.
    lead:
      name: Security Lead
      path: prompts/roles/leads/security.md
      model: quality
      color: "#dc2626"
    members:
      - name: Security Auditor
        path: agents/personas/red-team.md
        model: quality
        color: "#ef4444"
        consult-when: >
          OWASP Top 10, injection vectors, authentication bypass,
          CORS misconfiguration, secrets exposure, SSRF/CSRF.

  - team-name: QA
    team-color: "#2563eb"
    consult-when: >
      Test strategy, unit tests, integration tests, E2E tests,
      edge case identification, test data, CI test pipeline.
    lead:
      name: QA Lead
      path: prompts/roles/leads/qa.md
      model: quality
      color: "#2563eb"
    members:
      - name: Test Writer
        path: agents/personas/builder.md
        model: main
        color: "#3b82f6"
        consult-when: >
          Unit tests, integration tests, test fixtures, mocks,
          assertion patterns, coverage targets.
      - name: E2E Worker
        path: agents/personas/builder.md
        model: main
        color: "#60a5fa"
        consult-when: >
          End-to-end test scenarios, browser automation, API testing,
          load testing, regression suites.

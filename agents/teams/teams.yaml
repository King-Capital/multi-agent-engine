orchestrator:
  name: Orchestrator
  path: agents/personas/orchestrator.md
  model: quality
  color: "#36f9f6"

teams:
  - team-name: Planning
    team-color: "#ffd93d"
    consult-when: >
      Analyzing codebases, producing implementation plans, exploring
      file structures, mapping dependencies, assessing risks.
    lead:
      name: Planning Lead
      path: agents/personas/planner.md
      model: quality
      color: "#ffd93d"
    members:
      - name: Scout
        path: agents/personas/scout.md
        model: fast
        color: "#ffd93d"
        consult-when: >
          Fast codebase exploration, file discovery, dependency mapping,
          quick triage of large codebases.
      - name: Antagonist
        path: agents/personas/antagonist.md
        model: quality
        color: "#ff6666"
        consult-when: >
          Challenge the plan before handing off to Engineering.
          Find assumptions, missing edge cases, architectural risks.

  - team-name: Engineering
    team-color: "#00d4ff"
    consult-when: >
      Writing code, implementing features, fixing bugs, building
      infrastructure, creating new files, modifying existing code.
    lead:
      name: Engineering Lead
      path: agents/personas/planner.md
      model: quality
      color: "#00d4ff"
    members:
      - name: Backend Engineer
        path: agents/personas/backend-engineer.md
        model: main
        color: "#00d4ff"
        consult-when: >
          APIs, data layer, auth flows, database queries, middleware,
          server-side logic, error handling.
      - name: Frontend Engineer
        path: agents/personas/frontend-engineer.md
        model: main
        color: "#00b4d8"
        consult-when: >
          UI components, React, CSS, accessibility, state management,
          client-side routing, form handling.
      - name: Infrastructure Engineer
        path: agents/personas/infra-engineer.md
        model: main
        color: "#0090b0"
        consult-when: >
          CI/CD pipelines, Docker, deployment configs, reverse proxies,
          environment management, GitHub Actions.
      - name: Antagonist
        path: agents/personas/antagonist.md
        model: quality
        color: "#ff6666"
        consult-when: >
          Challenge approach before building. Stress-test assumptions,
          find edge cases, identify failure modes. Any lead can use.

  - team-name: Engineering B
    team-color: "#00d4ff"
    consult-when: >
      Parallel code implementation with a different model family
      for cross-model redundancy.
    lead:
      name: Engineering Lead (B)
      path: agents/personas/planner.md
      model: pro
      color: "#00d4ff"
    members:
      - name: Backend Engineer (B)
        path: agents/personas/backend-engineer.md
        model: pro
        color: "#00b4d8"
        consult-when: >
          Same scope as primary backend engineer but using Gemini model
          family for cross-model redundancy.
      - name: Antagonist (B)
        path: agents/personas/antagonist.md
        model: pro
        color: "#ff6666"
        consult-when: >
          Challenge approach, stress-test assumptions, find failure modes.

  - team-name: Validation
    team-color: "#ff6b9d"
    consult-when: >
      Code review, security review, QA testing, verifying implementations
      against requirements, grading code quality.
    lead:
      name: Validation Lead
      path: agents/personas/validator.md
      model: quality
      color: "#ff6b9d"
    members:
      - name: Code Reviewer
        path: agents/personas/reviewer.md
        model: quality
        color: "#ff6b9d"
        consult-when: >
          Code correctness review, quality checks, P0-P3 severity
          grading, atomic claim verification.
      - name: Security Reviewer
        path: agents/personas/red-team.md
        model: quality
        color: "#ff4466"
        consult-when: >
          OWASP checks, prompt injection, command injection, credential
          leaks, domain escape, config-as-execution attacks.

  - team-name: Validation B
    team-color: "#ff6b9d"
    consult-when: >
      Parallel validation with different model for cross-model verification.
    lead:
      name: Validation Lead (B)
      path: agents/personas/validator.md
      model: pro
      color: "#ff6b9d"
    members:
      - name: Code Reviewer (B)
        path: agents/personas/reviewer.md
        model: pro
        color: "#ff6b9d"
        consult-when: >
          Same review scope using Gemini model family for cross-model validation.

  # --- Design Team ---

  - team-name: Design
    team-color: "#a78bfa"
    consult-when: >
      UI design, visual design, design systems, component aesthetics,
      design review, creating design variants, style guides, CSS architecture.
    lead:
      name: Design Lead
      path: agents/personas/planner.md
      model: quality
      color: "#a78bfa"
    members:
      - name: Frontend Designer
        path: agents/personas/frontend-designer.md
        model: main
        color: "#c4b5fd"
        consult-when: >
          Creating design variants, reviewing visual quality,
          building design systems, CSS architecture, component styling.
      - name: Frontend Engineer
        path: agents/personas/frontend-engineer.md
        model: main
        color: "#8b5cf6"
        consult-when: >
          Implementing designs into React components, ensuring
          accessibility, responsive behavior, and performance.
      - name: Antagonist
        path: agents/personas/antagonist.md
        model: quality
        color: "#ff6666"
        consult-when: >
          Challenge design choices. Check accessibility, consistency,
          edge cases (empty states, overflow, RTL).

  # --- Canonical Code Swarm Review Teams ---

  - team-name: Correctness Review
    team-color: "#22d3ee"
    consult-when: >
      Canonical PR/code swarm correctness role. Verifies logic, regressions,
      type/runtime safety, API contracts, and edge cases.
    lead:
      name: Correctness Lead
      path: agents/personas/correctness-lead.md
      model: pro
      color: "#22d3ee"
    members:
      - name: Correctness Logic Reviewer
        path: agents/personas/correctness-reviewer.md
        model: pro
        color: "#06b6d4"
        consult-when: >
          One task: verify changed logic and runtime behavior against caller expectations.
      - name: Type Contract Reviewer
        path: agents/personas/api-designer.md
        model: pro
        color: "#0891b2"
        consult-when: >
          One task: verify public interfaces, type contracts, exports, and API compatibility.
      - name: Test Coverage Reviewer
        path: agents/personas/testing-engineer.md
        model: pro
        color: "#0e7490"
        consult-when: >
          One task: verify tests cover the changed behavior and cannot pass accidentally.

  - team-name: Adversarial Review
    team-color: "#f43f5e"
    consult-when: >
      Canonical PR/code swarm adversarial role. Breaks assumptions, finds
      hidden failure modes, brittle tests, race/order issues, and implicit coupling.
    lead:
      name: Adversarial Lead
      path: agents/personas/adversarial-lead.md
      model: quality
      color: "#f43f5e"
    members:
      - name: Assumption Breaker
        path: agents/personas/adversarial-reviewer.md
        model: quality
        color: "#e11d48"
        consult-when: >
          One task: break the main design assumption behind the change.
      - name: Edge Case Hunter
        path: agents/personas/testing-engineer.md
        model: quality
        color: "#be123c"
        consult-when: >
          One task: find boundary inputs, ordering issues, and failure modes tests may miss.
      - name: Coupling Reviewer
        path: agents/personas/antagonist.md
        model: quality
        color: "#9f1239"
        consult-when: >
          One task: find hidden coupling, stale state, and integration assumptions.

  - team-name: Quality Review
    team-color: "#a3e635"
    consult-when: >
      Canonical PR/code swarm quality role. Reviews maintainability,
      simplicity, readability, duplication, test quality, and code hygiene.
    lead:
      name: Quality Lead
      path: agents/personas/quality-lead.md
      model: pro
      color: "#a3e635"
    members:
      - name: Maintainability Reviewer
        path: agents/personas/quality-reviewer.md
        model: pro
        color: "#84cc16"
        consult-when: >
          One task: assess maintainability, naming, structure, and readability.
      - name: Simplicity Reviewer
        path: agents/personas/reviewer.md
        model: pro
        color: "#65a30d"
        consult-when: >
          One task: find unnecessary complexity, duplication, and overbroad changes.
      - name: Test Quality Reviewer
        path: agents/personas/testing-engineer.md
        model: pro
        color: "#4d7c0f"
        consult-when: >
          One task: assess test clarity, fixture quality, and assertion strength.

  - team-name: Security Review
    team-color: "#fb7185"
    consult-when: >
      Canonical PR/code swarm security role. Reviews auth, injection, SSRF,
      secrets, unsafe network/file/process operations, and privilege boundaries.
    lead:
      name: Security Lead
      path: agents/personas/security-lead.md
      model: quality
      color: "#fb7185"
    members:
      - name: Auth Boundary Reviewer
        path: agents/personas/red-team.md
        model: quality
        color: "#ff4466"
        consult-when: >
          One task: verify auth/authz, privilege boundaries, and session assumptions.
      - name: Input Attack Reviewer
        path: agents/personas/security-engineer.md
        model: quality
        color: "#fb7185"
        consult-when: >
          One task: check injection, SSRF, path/file/process/network input risks.
      - name: Secrets Config Reviewer
        path: agents/personas/infra-engineer.md
        model: quality
        color: "#f43f5e"
        consult-when: >
          One task: check secrets, config, dependency, and deployment security risks.

  - team-name: Domain Review
    team-color: "#f59e0b"
    consult-when: >
      Canonical PR/code swarm domain-specialist role. Reviews repo-specific
      business logic, operating constraints, trading/deploy/data/API semantics,
      and downstream integration correctness.
    lead:
      name: Domain Lead
      path: agents/personas/domain-lead.md
      model: pro
      color: "#f59e0b"
    members:
      - name: Domain Semantics Reviewer
        path: agents/personas/domain-reviewer.md
        model: pro
        color: "#fbbf24"
        consult-when: >
          One task: identify the domain lens and verify business/domain semantics.
      - name: Operations Fit Reviewer
        path: agents/personas/devops-engineer.md
        model: pro
        color: "#f59e0b"
        consult-when: >
          One task: verify deployment, operations, observability, and runbook fit.
      - name: Integration Reviewer
        path: agents/personas/backend-engineer.md
        model: pro
        color: "#d97706"
        consult-when: >
          One task: verify downstream consumers, adjacent repos, API/data flow, and rollout fit.

  # --- Swarm Teams (Review) ---

  - team-name: Red Team
    team-color: "#ff4466"
    consult-when: >
      Adversarial review, security testing, attack surface analysis,
      finding what others miss, breaking assumptions.
    lead:
      name: Validation Lead
      path: agents/personas/validator.md
      model: quality
      color: "#ff4466"
    members:
      - name: Adversarial Reviewer
        path: agents/personas/adversarial-reviewer.md
        model: quality
        color: "#ff2244"
        consult-when: >
          Devil's advocate review, assumption challenging, attack vector
          identification, edge case discovery.
      - name: Security Reviewer
        path: agents/personas/red-team.md
        model: quality
        color: "#ff4466"
        consult-when: >
          OWASP, injection, credential leaks, domain escape, prompt injection.

  - team-name: Blue Team
    team-color: "#4488ff"
    consult-when: >
      Correctness verification, quality review, maintainability assessment,
      deterministic claim validation.
    lead:
      name: Validation Lead (B)
      path: agents/personas/validator.md
      model: pro
      color: "#4488ff"
    members:
      - name: Correctness Reviewer
        path: agents/personas/correctness-reviewer.md
        model: quality
        color: "#4488ff"
        consult-when: >
          Atomic claim verification, deterministic checks, type safety,
          edge case coverage, spec compliance.
      - name: Quality Reviewer
        path: agents/personas/quality-reviewer.md
        model: pro
        color: "#66aaff"
        consult-when: >
          Maintainability, naming, structure, duplication, dead code,
          test quality, readability.

  # --- Standard Swarm Teams (5 specialist squads) ---

  - team-name: Architecture Coordination
    team-color: "#a855f7"
    consult-when: >
      Standard swarm kickoff: map the task into review domains, identify
      files/components for each SME squad, define coverage expectations,
      and produce the coordination brief used by downstream squad leads.
    lead:
      name: Arch Coordinator
      path: agents/personas/planner.md
      model: quality
      color: "#a855f7"
    members: []

  - team-name: Correctness Squad
    team-color: "#22d3ee"
    consult-when: >
      Correctness-focused review: logic errors, type safety, edge cases,
      API contract violations, state management bugs, runtime crashes.
    lead:
      name: Correctness Lead
      path: agents/personas/validator.md
      model: quality
      color: "#22d3ee"
    members:
      - name: Correctness Reviewer
        path: agents/personas/correctness-reviewer.md
        model: quality
        color: "#06b6d4"
        consult-when: >
          Atomic claim verification, type safety, edge case coverage,
          null/undefined handling, off-by-one errors.
      - name: Correctness Reviewer (B)
        path: agents/personas/correctness-reviewer.md
        model: pro
        color: "#0891b2"
        consult-when: >
          Cross-model correctness verification. Independent check
          with different model family for higher confidence.
      - name: Testing Reviewer
        path: agents/personas/testing-engineer.md
        model: main
        color: "#0e7490"
        consult-when: >
          Test coverage gaps, tests that pass accidentally,
          missing assertions, untested edge cases.
      - name: API Contract Reviewer
        path: agents/personas/api-designer.md
        model: main
        color: "#155e75"
        consult-when: >
          API contract violations, return type mismatches,
          parameter validation gaps, interface compliance.
      - name: State Machine Reviewer
        path: agents/personas/backend-engineer.md
        model: main
        color: "#134e4a"
        consult-when: >
          State transition correctness, unreachable states,
          race conditions in async flows, stale closure bugs.
      - name: Build Verifier
        path: agents/personas/builder.md
        model: main
        color: "#115e59"
        consult-when: >
          Build output verification, dependency resolution,
          import chain correctness, dead exports.

  - team-name: Adversarial Squad
    team-color: "#f43f5e"
    consult-when: >
      Adversarial review: break assumptions, find failure modes,
      identify implicit coupling, stress-test design decisions.
    lead:
      name: Adversarial Lead
      path: agents/personas/validator.md
      model: quality
      color: "#f43f5e"
    members:
      - name: Adversarial Reviewer
        path: agents/personas/adversarial-reviewer.md
        model: quality
        color: "#e11d48"
        consult-when: >
          Devil's advocate review, assumption challenging,
          attack vector identification, edge case discovery.
      - name: Adversarial Reviewer (B)
        path: agents/personas/adversarial-reviewer.md
        model: pro
        color: "#be123c"
        consult-when: >
          Cross-model adversarial analysis. Independent fault-finding
          with different model family.
      - name: Antagonist
        path: agents/personas/antagonist.md
        model: quality
        color: "#9f1239"
        consult-when: >
          Challenge every design decision. Find what happens when
          dependencies fail, inputs are malformed, state is stale.
      - name: Edge Case Hunter
        path: agents/personas/testing-engineer.md
        model: quality
        color: "#881337"
        consult-when: >
          Find inputs that cause unexpected behavior. Race conditions,
          boundary values, empty states, concurrent access patterns.
      - name: Assumption Breaker
        path: agents/personas/scout.md
        model: main
        color: "#831843"
        consult-when: >
          Map implicit assumptions in the code. Find undocumented
          preconditions, hidden coupling, config-as-code risks.

  - team-name: Quality Squad
    team-color: "#a3e635"
    consult-when: >
      Quality and maintainability review: SOLID violations, anti-patterns,
      code duplication, abstraction mismatches, dead code.
    lead:
      name: Quality Lead
      path: agents/personas/validator.md
      model: quality
      color: "#a3e635"
    members:
      - name: Quality Reviewer
        path: agents/personas/quality-reviewer.md
        model: quality
        color: "#84cc16"
        consult-when: >
          Maintainability, naming, structure, duplication,
          dead code, readability, abstraction level.
      - name: Quality Reviewer (B)
        path: agents/personas/quality-reviewer.md
        model: pro
        color: "#65a30d"
        consult-when: >
          Cross-model quality analysis with different model family.
      - name: Code Reviewer
        path: agents/personas/reviewer.md
        model: main
        color: "#4d7c0f"
        consult-when: >
          General code review, P0-P3 severity grading,
          atomic claim verification.
      - name: Architecture Reviewer
        path: agents/personas/planner.md
        model: quality
        color: "#3f6212"
        consult-when: >
          Architectural anti-patterns, abstraction mismatches,
          dependency direction violations, module coupling.
      - name: Test Quality Reviewer
        path: agents/personas/testing-engineer.md
        model: main
        color: "#365314"
        consult-when: >
          Test quality audit: assertion density, test isolation,
          flaky test patterns, mock correctness.

  - team-name: Security Squad
    team-color: "#f97316"
    consult-when: >
      Security-focused review: OWASP top 10, injection vectors,
      credential handling, domain escape, SSRF, path traversal.
    lead:
      name: Security Lead
      path: agents/personas/validator.md
      model: quality
      color: "#f97316"
    members:
      - name: Security Reviewer
        path: agents/personas/red-team.md
        model: quality
        color: "#ea580c"
        consult-when: >
          OWASP checks, injection, credential leaks,
          domain escape, prompt injection, SSRF.
      - name: Security Reviewer (B)
        path: agents/personas/red-team.md
        model: pro
        color: "#c2410c"
        consult-when: >
          Cross-model security analysis for higher confidence.
      - name: Infrastructure Reviewer
        path: agents/personas/infra-engineer.md
        model: main
        color: "#9a3412"
        consult-when: >
          Deploy config security, environment leaks, network exposure,
          container escape, privilege escalation.
      - name: DevOps Security Reviewer
        path: agents/personas/devops-engineer.md
        model: main
        color: "#7c2d12"
        consult-when: >
          CI/CD pipeline security, GitHub Actions risks,
          deploy key exposure, secret management gaps.
      - name: Dependency Auditor
        path: agents/personas/scout.md
        model: main
        color: "#6c2e12"
        consult-when: >
          Dependency chain vulnerabilities, transitive risk,
          version pinning, supply chain attack surface.

  - team-name: Domain Squad
    team-color: "#c084fc"
    consult-when: >
      Domain-specific review: architectural fit, pattern compliance,
      framework conventions, integration correctness.
    lead:
      name: Domain Lead
      path: agents/personas/planner.md
      model: quality
      color: "#c084fc"
    members:
      - name: Backend Reviewer
        path: agents/personas/backend-engineer.md
        model: main
        color: "#a855f7"
        consult-when: >
          API design, data layer, auth flows, middleware patterns,
          error handling conventions.
      - name: Frontend Reviewer
        path: agents/personas/frontend-engineer.md
        model: main
        color: "#9333ea"
        consult-when: >
          UI patterns, React conventions, state management,
          accessibility, component architecture.
      - name: Data Reviewer
        path: agents/personas/data-engineer.md
        model: main
        color: "#7e22ce"
        consult-when: >
          Data pipeline correctness, schema validation,
          query performance, data integrity.
      - name: Security-Aware Domain Reviewer
        path: agents/personas/security-engineer.md
        model: main
        color: "#6b21a8"
        consult-when: >
          Domain-specific security patterns, auth flows,
          data access controls, business logic vulnerabilities.
      - name: Integration Reviewer
        path: agents/personas/infra-engineer.md
        model: main
        color: "#581c87"
        consult-when: >
          Cross-module integration points, config consistency,
          environment parity, deploy pipeline correctness.

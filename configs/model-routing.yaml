tiers:
  high:
    description: "Orchestrators, leads, deep analysis, complex reasoning"
    options:
      - model: litellm/opus-nocache
        thinking: high
        note: "Max intelligence, full reasoning"
      - model: openai-codex/gpt-5.5
        thinking: high
        note: "Cross-model validation partner"
    default: litellm/opus-nocache
    default_thinking: high
    context: 1000000

  medium:
    description: "Builders, workers, implementation, standard tasks"
    options:
      - model: litellm/opus-nocache
        thinking: low
        note: "Opus with low thinking = fast but still smart"
      - model: openai-codex/gpt-5.5
        thinking: medium
        note: "GPT-5.5 medium thinking"
    default: openai-codex/gpt-5.5
    default_thinking: medium
    context: 1000000

  fast:
    description: "Scouts, triage, quick exploration, cheap passes"
    options:
      - model: openai-codex/gpt-5.5
        thinking: low
        note: "GPT-5.5 low thinking for fast passes"
      - model: litellm/opus-nocache
        thinking: low
        note: "Opus low thinking"
    default: openai-codex/gpt-5.5
    default_thinking: low
    context: 200000

# Thinking level reference:
#   off     → no reasoning, raw response (cheapest)
#   minimal → bare minimum reasoning
#   low     → light reasoning, fast (sonnet low ≈ fast model, opus low ≈ medium model)
#   medium  → balanced (default for most work)
#   high    → full reasoning chain (orchestrator/lead default)
#   xhigh   → extended reasoning, max quality (rarely needed)

# Model aliases used in persona frontmatter
aliases:
  quality: litellm/opus-nocache
  main: litellm/sonnet-nocache
  fast: litellm/sonnet-nocache
  pro: openai-codex/gpt-5.5
  free: litellm/sonnet-nocache

# Role → tier mapping (always push leaders HIGH)
roleDefaults:
  orchestrator:
    tier: high
    thinking: high
  lead:
    tier: high
    thinking: high
  worker:
    tier: medium
    thinking: medium
  scout:
    tier: fast
    thinking: low

crossModelPairs:
  - builder: litellm/opus-nocache
    verifier: openai-codex/gpt-5.5
  - builder: openai-codex/gpt-5.5
    verifier: litellm/opus-nocache

budgets:
  max_per_session_usd: 50.00
  warn_at_usd: 25.00
  max_per_agent_usd: 15.00
  max_total_tokens: 10000000

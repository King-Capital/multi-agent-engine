tiers:
  high:
    description: "Orchestrators, leads, deep analysis, complex reasoning"
    options:
      - model: litellm/opus-nocache
        thinking: high
        note: "Max intelligence, full reasoning"
      - model: openai/gpt-5.5
        thinking: high
        note: "Cross-model validation partner"
      - model: litellm/pro-nocache
        thinking: high
        note: "Gemini 3.1 Pro, free high-tier option"
    default: litellm/opus-nocache
    default_thinking: high
    context: 1000000

  medium:
    description: "Builders, workers, implementation, standard tasks"
    options:
      - model: litellm/opus-nocache
        thinking: low
        note: "Opus with low thinking = fast but still smart"
      - model: litellm/sonnet-nocache
        thinking: medium
        note: "Sonnet 4.6 medium thinking, good balance"
      - model: openai/gpt-5.4-mini
        thinking: medium
        note: "Cheaper OpenAI option"
      - model: litellm/pro-nocache
        thinking: medium
        note: "Gemini 3.1 Pro, free medium option"
    default: litellm/sonnet-nocache
    default_thinking: medium
    context: 1000000

  fast:
    description: "Scouts, triage, quick exploration, cheap passes"
    options:
      - model: litellm/sonnet-nocache
        thinking: low
        note: "Sonnet 4.6 low thinking = fast model"
      - model: litellm/sonnet-nocache
        thinking: minimal
        note: "Even faster, near-zero reasoning overhead"
      - model: litellm/pro-nocache
        thinking: low
        note: "Gemini 3.1 Pro low, free fast option"
      - model: litellm/flash
        thinking: off
        note: "Gemini Flash, cheapest possible"
    default: litellm/sonnet-nocache
    default_thinking: low
    context: 200000

# Thinking level reference:
#   off     → no reasoning, raw response (cheapest)
#   minimal → bare minimum reasoning
#   low     → light reasoning, fast (sonnet low ≈ fast model, opus low ≈ medium model)
#   medium  → balanced (default for most work)
#   high    → full reasoning chain (orchestrator/lead default)
#   xhigh   → extended reasoning, max quality (rarely needed)

# Model aliases used in persona frontmatter
aliases:
  quality: litellm/opus-nocache
  main: litellm/sonnet-nocache
  fast: litellm/sonnet-nocache
  pro: litellm/pro-nocache
  free: litellm/flash

# Role → tier mapping (always push leaders HIGH)
roleDefaults:
  orchestrator:
    tier: high
    thinking: high
  lead:
    tier: high
    thinking: high
  worker:
    tier: medium
    thinking: medium
  scout:
    tier: fast
    thinking: low

crossModelPairs:
  - builder: litellm/opus-nocache
    verifier: openai/gpt-5.5
  - builder: litellm/sonnet-nocache
    verifier: litellm/pro-nocache
  - builder: litellm/sonnet-nocache
    verifier: openai/gpt-5.5
  - builder: openai/gpt-5.5
    verifier: litellm/opus-nocache
  - builder: litellm/pro-nocache
    verifier: litellm/opus-nocache

budgets:
  max_per_session_usd: 50.00
  warn_at_usd: 25.00
  max_per_agent_usd: 15.00
  max_total_tokens: 10000000

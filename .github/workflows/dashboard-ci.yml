name: Dashboard CI

on:
  pull_request:
    paths:
      - 'dashboard/**'
      - 'dashboard-next/**'
      - '.github/workflows/dashboard-ci.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build React SPA
        working-directory: dashboard-next
        run: |
          bun install
          bun run build

      - name: Build Go API
        working-directory: dashboard
        run: go build -o mae-dashboard .

      - name: Vet
        working-directory: dashboard
        run: go vet ./...

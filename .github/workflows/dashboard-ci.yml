name: Dashboard CI

on:
  pull_request:
    paths:
      - 'dashboard/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build
        working-directory: dashboard
        run: go build -o mae-dashboard .

      - name: Vet
        working-directory: dashboard
        run: go vet ./...

name: Dashboard CI

on:
  pull_request:
    paths:
      - 'dashboard/**'

jobs:
  build:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: dashboard
        run: go build -o mae-dashboard .

      - name: Vet
        working-directory: dashboard
        run: go vet ./...

      - name: Smoke test
        working-directory: dashboard
        run: |
          DATABASE_URL="postgres://mae:mae@localhost:5432/mae?sslmode=disable" \
            timeout 5 ./mae-dashboard --port 8499 &
          sleep 2
          curl -sf http://localhost:8499/api/users | grep rico
          kill %1 2>/dev/null || true
          echo "Smoke test passed"

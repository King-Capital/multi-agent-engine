name: Sandbox Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - create
          - provision
          - warm
          - destroy
      vmid:
        description: 'VMID (default: 411)'
        required: false
        default: '411'
      ip_address:
        description: 'Static IP for new sandbox'
        required: false
        default: '10.71.20.171'
      hostname:
        description: 'Hostname (default: mae-sandbox-01)'
        required: false
        default: 'mae-sandbox-01'

permissions:
  contents: read

concurrency:
  group: sandbox-${{ inputs.vmid }}
  cancel-in-progress: false

jobs:
  sandbox:
    name: "${{ inputs.action }} CT ${{ inputs.vmid }}"
    runs-on: [self-hosted, mae]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "🔧 Create sandbox LXC ${{ inputs.vmid }}"
        if: inputs.action == 'create'
        run: |
          set -euo pipefail
          echo "::group::Creating CT ${{ inputs.vmid }} (${{ inputs.hostname }}) on proxmox05"
          echo "  VMID:     ${{ inputs.vmid }}"
          echo "  Hostname: ${{ inputs.hostname }}"
          echo "  IP:       ${{ inputs.ip_address }}"
          echo "  Template: TN01_lxc_nvme:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
          echo "  Storage:  px05_zfs_disk (16GB)"
          echo "  Resources: 2 cores, 2GB RAM, 512MB swap"
          echo "  Features: nesting=1"
          echo ""

          RESULT=$(curl -sk -X POST \
            "https://10.71.1.5:8006/api2/json/nodes/proxmox05/lxc" \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "vmid": ${{ inputs.vmid }},
              "ostemplate": "TN01_lxc_nvme:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst",
              "hostname": "${{ inputs.hostname }}",
              "cores": 2, "memory": 2048, "swap": 512,
              "rootfs": "px05_zfs_disk:16",
              "net0": "name=eth0,bridge=vmbr0,ip=${{ inputs.ip_address }}/24,gw=10.71.1.1",
              "unprivileged": 1, "features": "nesting=1", "start": 1
            }')

          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          if d.get('data'):
              print(f'✅ Task started: {d[\"data\"]}')
          elif d.get('errors'):
              print(f'❌ Failed: {json.dumps(d[\"errors\"], indent=2)}')
              sys.exit(1)
          else:
              print(f'⚠️  Unexpected: {json.dumps(d, indent=2)}')
          "
          echo "::endgroup::"

          # Wait for container to boot
          echo "::group::Waiting for container to boot"
          for i in $(seq 1 30); do
            if ping -c1 -W2 ${{ inputs.ip_address }} &>/dev/null; then
              echo "✅ Container is up after ${i}s"
              break
            fi
            echo "  Waiting... (${i}/30)"
            sleep 2
          done
          echo "::endgroup::"

      - name: "📦 Provision sandbox ${{ inputs.vmid }}"
        if: inputs.action == 'provision' || inputs.action == 'create'
        run: |
          set -euo pipefail
          IP="${{ inputs.ip_address }}"

          echo "::group::SSH connectivity check"
          for i in $(seq 1 10); do
            if ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no mae@$IP "echo ok" &>/dev/null; then
              echo "✅ SSH connected to mae@$IP"
              break
            fi
            echo "  Retrying SSH... (${i}/10)"
            sleep 3
          done
          echo "::endgroup::"

          echo "::group::Tool versions"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            echo 'Node:    '  \$(node --version 2>/dev/null || echo MISSING)
            echo 'Bun:     '  \$(bun --version 2>/dev/null || echo MISSING)
            echo 'Go:      '  \$(/usr/local/go/bin/go version 2>/dev/null || echo MISSING)
            echo 'GH CLI:  '  \$(gh --version 2>/dev/null | head -1 || echo MISSING)
            echo 'uv:      '  \$(~/.local/bin/uv --version 2>/dev/null || echo MISSING)
            echo 'Claude:  '  \$(claude --version 2>/dev/null || echo MISSING)
            echo 'Git:     '  \$(git --version 2>/dev/null || echo MISSING)
          "
          echo "::endgroup::"

          echo "::group::Repos"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            echo '--- ~/Development/King-Capital/ ---'
            ls ~/Development/King-Capital/ 2>/dev/null || echo '(empty)'
            echo ''
            echo '--- Disk usage ---'
            df -h / | tail -1
          "
          echo "::endgroup::"

      - name: "🔄 Warm sandbox ${{ inputs.vmid }}"
        if: inputs.action == 'warm'
        run: |
          set -euo pipefail
          IP="${{ inputs.ip_address }}"

          echo "::group::Pulling all repos"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            cd ~/Development/King-Capital
            for d in */; do
              echo \"Pulling \$d...\"
              cd ~/Development/King-Capital/\$d
              git pull --ff-only 2>&1 | tail -1
              cd ~/Development/King-Capital
            done
          "
          echo "::endgroup::"

          echo "::group::Refreshing deps"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            source ~/.zshrc
            echo '--- MAE engine ---'
            cd ~/Development/King-Capital/multi-agent-engine/engine && bun install 2>&1 | tail -2
            echo '--- MAE dashboard ---'
            cd ~/Development/King-Capital/multi-agent-engine/dashboard && /usr/local/go/bin/go mod download 2>&1 | tail -2
            echo '--- king-core ---'
            cd ~/Development/King-Capital/king-core && bun install 2>&1 | tail -2
          "
          echo "::endgroup::"

          echo "::group::Tool versions"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            echo 'Node:' \$(node --version) | echo 'Bun:' \$(bun --version)
            echo 'Disk:' \$(df -h / | tail -1)
          "
          echo "::endgroup::"

      - name: "💀 Destroy sandbox ${{ inputs.vmid }}"
        if: inputs.action == 'destroy'
        run: |
          set -euo pipefail
          VMID="${{ inputs.vmid }}"

          if [ "$VMID" = "410" ]; then
            echo "❌ REFUSING to destroy mae-golden (CT 410). That's the template."
            exit 1
          fi

          echo "::group::Stopping CT $VMID"
          curl -sk -X POST \
            "https://10.71.1.5:8006/api2/json/nodes/proxmox05/lxc/$VMID/status/stop" \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Stop task: {d.get(\"data\",\"failed\")}')"
          sleep 5
          echo "::endgroup::"

          echo "::group::Destroying CT $VMID"
          curl -sk -X DELETE \
            "https://10.71.1.5:8006/api2/json/nodes/proxmox05/lxc/$VMID?force=1&purge=1" \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Destroy task: {d.get(\"data\",\"failed\")}')"
          echo "::endgroup::"

          echo "✅ CT $VMID destroyed"

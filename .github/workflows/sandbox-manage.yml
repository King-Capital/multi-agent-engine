name: Sandbox Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - clone
          - warm
          - verify
          - destroy
      sandbox_id:
        description: 'Sandbox number (1-4)'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'

permissions:
  contents: read

concurrency:
  group: sandbox-${{ inputs.sandbox_id }}
  cancel-in-progress: false

env:
  PVE_API: "https://10.71.1.9:8006/api2/json"
  GOLDEN_VMID: "1000"
  PVE_NODE: "proxmox05"
  SNAPSHOT: "mae-golden-v1"

jobs:
  sandbox:
    name: "${{ inputs.action }} mae-sandbox-${{ inputs.sandbox_id }}"
    runs-on: [self-hosted, mae]
    env:
      VMID: ${{ fromJSON(format('{0}', inputs.sandbox_id)) + 800 }}
      IP: "10.71.20.${{ fromJSON(format('{0}', inputs.sandbox_id)) + 80 }}"
      HOSTNAME: "mae-sandbox-${{ inputs.sandbox_id }}"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: "📦 Clone mae-sandbox-${{ inputs.sandbox_id }}"
        if: inputs.action == 'clone'
        run: |
          set -euo pipefail
          TOKEN="PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}"

          echo "::group::Clone CT $GOLDEN_VMID -> CT $VMID ($HOSTNAME at $IP)"
          curl -sk -X POST "$PVE_API/nodes/$PVE_NODE/lxc/$GOLDEN_VMID/clone" \
            -H "Authorization: $TOKEN" \
            -d "newid=$VMID&hostname=$HOSTNAME&snapname=$SNAPSHOT&storage=px05_zfs_disk&full=1"
          echo "Clone submitted. Waiting 60s for full clone..."
          sleep 60
          echo "::endgroup::"

          echo "::group::Configure network + nesting"
          curl -sk -X PUT "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/config" \
            -H "Authorization: $TOKEN" \
            -d "net0=name%3Deth0%2Cbridge%3Dvmbr0%2Ctag%3D20%2Cip%3D${IP}%2F24%2Cgw%3D10.71.20.1%2Cfirewall%3D0" \
            -d "features=nesting%3D1"
          echo "::endgroup::"

          echo "::group::Start"
          curl -sk -X POST "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/status/start" \
            -H "Authorization: $TOKEN"
          echo "::endgroup::"

          echo "::group::Wait for SSH"
          sleep 15
          for i in $(seq 1 10); do
            if ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no mae@$IP hostname &>/dev/null; then
              echo "✅ mae-sandbox-${{ inputs.sandbox_id }} is up at $IP"
              break
            fi
            echo "  Waiting... (${i}/10)"
            sleep 5
          done
          echo "::endgroup::"

      - name: "🔄 Warm"
        if: inputs.action == 'warm'
        run: |
          set -euo pipefail
          echo "::group::Pull repos + refresh deps"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            cd ~/Development/King-Capital
            for d in */; do
              echo -n \"  \$d: \"
              cd ~/Development/King-Capital/\$d
              git pull --ff-only 2>&1 | tail -1
              cd ~/Development/King-Capital
            done
          "
          echo "::endgroup::"

      - name: "🔍 Verify"
        if: inputs.action == 'verify'
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no mae@$IP "
            echo '=== Tools ==='
            echo \"Node: \$(node --version)\"
            echo \"Bun: \$(bun --version)\"
            echo \"Go: \$(/usr/local/go/bin/go version)\"
            echo \"GH: \$(gh --version | head -1)\"
            echo \"Claude: \$(claude --version 2>/dev/null)\"
            echo ''
            echo '=== Repos ==='
            ls ~/Development/King-Capital/
            echo ''
            echo '=== Disk ==='
            df -h / | tail -1
          "

      - name: "💀 Destroy"
        if: inputs.action == 'destroy'
        run: |
          set -euo pipefail
          TOKEN="PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}"

          echo "Stopping CT $VMID..."
          curl -sk -X POST "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/status/stop" \
            -H "Authorization: $TOKEN"
          sleep 5

          echo "Destroying CT $VMID..."
          curl -sk -X DELETE "$PVE_API/nodes/$PVE_NODE/lxc/$VMID" \
            -H "Authorization: $TOKEN"
          echo "✅ mae-sandbox-${{ inputs.sandbox_id }} destroyed"

name: Sandbox Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - clone
          - activate
          - deactivate
          - warm
          - verify
          - destroy
      sandbox_id:
        description: 'Sandbox number (1-4)'
        required: true
        type: choice
        options: ['1', '2', '3', '4']

permissions:
  contents: read

concurrency:
  group: sandbox-${{ inputs.sandbox_id }}

env:
  PVE_API: "https://10.71.1.9:8006/api2/json"
  PVE_NODE: "proxmox05"
  GOLDEN_VMID: "1000"
  SNAPSHOT: "mae-golden-v1"

jobs:
  sandbox:
    name: "${{ inputs.action }} mae-sandbox-${{ inputs.sandbox_id }}"
    runs-on: [self-hosted, mae]
    env:
      VMID: ""
      IP: ""
      HOSTNAME: "mae-sandbox-${{ inputs.sandbox_id }}"
    steps:
      - name: Set sandbox vars
        run: |
          echo "VMID=$((800 + ${{ inputs.sandbox_id }}))" >> $GITHUB_ENV
          echo "IP=10.71.20.$((80 + ${{ inputs.sandbox_id }}))" >> $GITHUB_ENV

      - name: "📦 Clone"
        if: inputs.action == 'clone'
        run: |
          TOKEN="PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}"

          echo "::group::Clone CT $GOLDEN_VMID -> $VMID ($HOSTNAME at $IP)"
          curl -sk -X POST "$PVE_API/nodes/$PVE_NODE/lxc/$GOLDEN_VMID/clone" \
            -H "Authorization: $TOKEN" \
            -d "newid=$VMID&hostname=$HOSTNAME&snapname=$SNAPSHOT&storage=px05_zfs_disk&full=1"
          echo "Waiting 60s for full clone..."
          sleep 60
          echo "::endgroup::"

          echo "::group::Configure (network + nesting + 512MB warm)"
          curl -sk -X PUT "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/config" \
            -H "Authorization: $TOKEN" \
            -d "net0=name%3Deth0%2Cbridge%3Dvmbr0%2Ctag%3D20%2Cip%3D${IP}%2F24%2Cgw%3D10.71.20.1%2Cfirewall%3D0" \
            -d "features=nesting%3D1" \
            -d "memory=512"
          echo "::endgroup::"

          echo "::group::Start"
          curl -sk -X POST "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/status/start" \
            -H "Authorization: $TOKEN"
          sleep 15
          echo "✅ $HOSTNAME warm @ 512MB"
          echo "::endgroup::"

      - name: "⬆️ Activate (4GB)"
        if: inputs.action == 'activate'
        run: |
          curl -sk -X PUT "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/config" \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}" \
            -d "memory=4096"
          echo "✅ $HOSTNAME activated @ 4GB (no reboot)"

      - name: "⬇️ Deactivate (512MB)"
        if: inputs.action == 'deactivate'
        run: |
          curl -sk -X PUT "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/config" \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}" \
            -d "memory=512"
          echo "✅ $HOSTNAME deactivated @ 512MB (no reboot)"

      - name: "🔄 Warm"
        if: inputs.action == 'warm'
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no mae@$IP "
            cd ~/Development/King-Capital
            for d in */; do
              echo -n \"  \$d: \"
              cd ~/Development/King-Capital/\$d
              git pull --ff-only 2>&1 | tail -1
              cd ~/Development/King-Capital
            done
          "

      - name: "🔍 Verify"
        if: inputs.action == 'verify'
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no mae@$IP "
            echo \"Node: \$(node --version)\"
            echo \"Bun: \$(bun --version)\"
            echo \"Go: \$(/usr/local/go/bin/go version)\"
            echo \"Repos: \$(ls ~/Development/King-Capital | wc -l)\"
            echo \"Disk: \$(df -h / | tail -1 | awk '{print \$3 \" / \" \$2}')\"
          "

      - name: "💀 Destroy"
        if: inputs.action == 'destroy'
        run: |
          TOKEN="PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}"
          curl -sk -X POST "$PVE_API/nodes/$PVE_NODE/lxc/$VMID/status/stop" \
            -H "Authorization: $TOKEN"
          sleep 5
          curl -sk -X DELETE "$PVE_API/nodes/$PVE_NODE/lxc/$VMID" \
            -H "Authorization: $TOKEN"
          echo "✅ $HOSTNAME destroyed"

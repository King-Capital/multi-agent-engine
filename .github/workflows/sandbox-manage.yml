name: Sandbox Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options:
          - create
          - activate
          - deactivate
          - warm
          - verify
          - destroy
      sandbox_id:
        description: 'Sandbox number (1-4)'
        required: true
        type: choice
        options: ['1', '2', '3', '4']
      node:
        description: 'Proxmox node'
        required: false
        type: choice
        options:
          - proxmox05
          - proxmox04
          - proxmox01
          - proxmox02
        default: proxmox05

permissions:
  contents: read

concurrency:
  group: sandbox-${{ inputs.sandbox_id }}

env:
  PVE_API: ${{ secrets.PVE_API_URL }}           # e.g. https://proxmox:8006/api2/json
  BACKUP: ${{ vars.SANDBOX_BACKUP_TEMPLATE }}    # e.g. storage:backup/vzdump-lxc-xxx.tar.zst
  SANDBOX_SUBNET: ${{ vars.SANDBOX_SUBNET }}     # e.g. 10.0.20
  SANDBOX_GATEWAY: ${{ vars.SANDBOX_GATEWAY }}   # e.g. 10.0.20.1
  SANDBOX_VMID_BASE: ${{ vars.SANDBOX_VMID_BASE || '800' }}

jobs:
  sandbox:
    name: "${{ inputs.action }} mae-sandbox-${{ inputs.sandbox_id }} (${{ inputs.node }})"
    runs-on: [self-hosted, mae]
    env:
      NODE: ${{ inputs.node }}
    steps:
      - name: Set sandbox vars
        run: |
          echo "VMID=$(($SANDBOX_VMID_BASE + ${{ inputs.sandbox_id }}))" >> $GITHUB_ENV
          echo "IP=${SANDBOX_SUBNET}.$((80 + ${{ inputs.sandbox_id }}))" >> $GITHUB_ENV
          echo "HOSTNAME=mae-sandbox-${{ inputs.sandbox_id }}" >> $GITHUB_ENV

      - name: "📦 Create (restore from backup)"
        if: inputs.action == 'create'
        run: |
          set -euo pipefail
          TOKEN="PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}"

          echo "::group::Restore backup -> CT $VMID ($HOSTNAME) on $NODE"
          echo "  Backup:  $BACKUP"
          echo "  Storage: px05_zfs_disk"
          echo "  IP:      $IP"

          curl -sk -X POST "$PVE_API/nodes/$NODE/lxc" \
            -H "Authorization: $TOKEN" \
            --data-urlencode "vmid=$VMID" \
            --data-urlencode "hostname=$HOSTNAME" \
            --data-urlencode "storage=px05_zfs_disk" \
            --data-urlencode "unprivileged=1" \
            --data-urlencode "ostemplate=$BACKUP" \
            --data-urlencode "restore=1"

          echo "Waiting 90s for restore..."
          sleep 90
          echo "::endgroup::"

          echo "::group::Configure (network + nesting + 512MB)"
          curl -sk -X PUT "$PVE_API/nodes/$NODE/lxc/$VMID/config" \
            -H "Authorization: $TOKEN" \
            -d "net0=name%3Deth0%2Cbridge%3Dvmbr0%2Ctag%3D20%2Cip%3D${IP}%2F24%2Cgw%3D${SANDBOX_GATEWAY}%2Cfirewall%3D0" \
            -d "features=nesting%3D1" \
            -d "memory=512"
          echo "::endgroup::"

          echo "::group::Start"
          curl -sk -X POST "$PVE_API/nodes/$NODE/lxc/$VMID/status/start" \
            -H "Authorization: $TOKEN"
          sleep 15
          echo "::endgroup::"

          echo "::group::Verify SSH"
          for i in $(seq 1 10); do
            if ssh -o ConnectTimeout=3 -o StrictHostKeyChecking=no mae@$IP hostname &>/dev/null; then
              echo "✅ $HOSTNAME up at $IP on $NODE (warm @ 512MB)"
              break
            fi
            echo "  Waiting for SSH... (${i}/10)"
            sleep 5
          done
          echo "::endgroup::"

      - name: "⬆️ Activate (4GB)"
        if: inputs.action == 'activate'
        run: |
          curl -sk -X PUT "$PVE_API/nodes/$NODE/lxc/$VMID/config" \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}" \
            -d "memory=4096"
          echo "✅ $HOSTNAME activated @ 4GB (no reboot)"

      - name: "⬇️ Deactivate (512MB)"
        if: inputs.action == 'deactivate'
        run: |
          curl -sk -X PUT "$PVE_API/nodes/$NODE/lxc/$VMID/config" \
            -H "Authorization: PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}" \
            -d "memory=512"
          echo "✅ $HOSTNAME deactivated @ 512MB (no reboot)"

      - name: "🔄 Warm (pull repos)"
        if: inputs.action == 'warm'
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no mae@$IP "
            cd ~/Development/King-Capital
            for d in */; do
              echo -n \"  \$d: \"
              cd ~/Development/King-Capital/\$d
              git pull --ff-only 2>&1 | tail -1
              cd ~/Development/King-Capital
            done
          "
          echo "✅ $HOSTNAME repos updated"

      - name: "🔍 Verify"
        if: inputs.action == 'verify'
        run: |
          ssh -o ConnectTimeout=10 -o StrictHostKeyChecking=no mae@$IP "
            echo \"Hostname: \$(hostname)\"
            echo \"Node:     \$(node --version)\"
            echo \"Bun:      \$(bun --version)\"
            echo \"Go:       \$(/usr/local/go/bin/go version)\"
            echo \"Claude:   \$(claude --version 2>/dev/null)\"
            echo \"Repos:    \$(ls ~/Development/King-Capital | wc -l)\"
            echo \"RAM:      \$(free -m | grep Mem | awk '{print \$2}')MB\"
            echo \"Disk:     \$(df -h / | tail -1 | awk '{print \$3 \"/\" \$2}')\"
          "

      - name: "💀 Destroy"
        if: inputs.action == 'destroy'
        run: |
          TOKEN="PVEAPIToken=${{ secrets.PROXMOX_API_TOKEN }}"
          curl -sk -X POST "$PVE_API/nodes/$NODE/lxc/$VMID/status/stop" \
            -H "Authorization: $TOKEN"
          sleep 5
          curl -sk -X DELETE "$PVE_API/nodes/$NODE/lxc/$VMID?force=1&purge=1" \
            -H "Authorization: $TOKEN"
          echo "✅ $HOSTNAME destroyed on $NODE"

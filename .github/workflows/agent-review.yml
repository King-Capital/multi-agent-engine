name: Agent Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      chain:
        description: 'Chain to run (review-only, plan-build-review, scout-then-plan)'
        required: false
        default: 'review-only'

permissions:
  contents: read
  pull-requests: write

jobs:
  agent-review:
    runs-on: [self-hosted, mae]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install engine dependencies
        working-directory: engine
        run: bun install

      - name: Run agent review (dry-run)
        working-directory: engine
        run: |
          MAE_ROOT=${{ github.workspace }} \
          bun cli.ts run review "PR #${{ github.event.pull_request.number }}" --dry-run

      - name: Run tests
        working-directory: engine
        run: bun test

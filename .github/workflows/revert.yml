name: Revert to Tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to revert to (e.g. v0.2.0)"
        required: true
        type: string

permissions: {}

concurrency:
  group: mae-deploy
  cancel-in-progress: false

jobs:
  revert:
    runs-on: [self-hosted, mae]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.tag }}

      - name: Snapshot current state
        run: |
          mkdir -p ~/mae-snapshots
          tar -czf ~/mae-snapshots/pre-revert-$(date +%Y%m%d-%H%M%S).tar.gz \
            --exclude='node_modules' \
            --exclude='mae-dashboard' \
            -C /opt/mae .

      - name: Deploy reverted version
        run: |
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dashboard/mae-dashboard' \
            --exclude='dashboard/data' \
            ./ /opt/mae/

      - name: Install engine dependencies
        run: cd /opt/mae/engine && bun install

      - name: Run migrations
        run: sudo -u postgres psql -d mae -f /opt/mae/dashboard/migrations/001_initial.sql 2>/dev/null || true

      - name: Build dashboard
        run: cd /opt/mae/dashboard && go build -o mae-dashboard .

      - name: Set ownership
        run: chown -R mae:mae /opt/mae

      - name: Restart dashboard
        run: |
          systemctl restart mae-dashboard
          sleep 3
          systemctl is-active mae-dashboard

      - name: Health check
        id: healthcheck
        continue-on-error: true
        run: |
          curl -sf http://localhost:8400/api/users > /dev/null
          echo "Reverted to ${{ inputs.tag }} — healthy"

      - name: Rollback on failure
        if: steps.healthcheck.outcome == 'failure'
        run: |
          echo "::error::Revert failed, restoring previous snapshot"
          LATEST=$(ls -t ~/mae-snapshots/pre-revert-*.tar.gz | head -1)
          tar -xzf "$LATEST" -C /opt/mae
          cd /opt/mae/engine && bun install
          cd /opt/mae/dashboard && go build -o mae-dashboard .
          chown -R mae:mae /opt/mae
          systemctl restart mae-dashboard
          sleep 3
          curl -sf http://localhost:8400/api/users > /dev/null
          echo "Rolled back successfully"
          exit 1

      - name: Cleanup old snapshots
        continue-on-error: true
        run: ls -t ~/mae-snapshots/pre-revert-*.tar.gz | tail -n +4 | xargs rm -f

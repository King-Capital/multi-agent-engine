name: Auto Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: false
        default: patch
        type: choice
        options: [patch, minor, major]
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-version-main
  cancel-in-progress: false

jobs:
  version-bump:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && !startsWith(github.event.pull_request.title, 'chore(release):'))
    runs-on: [self-hosted, mae]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Check for VERSION file
        id: check
        run: |
          if [ ! -f VERSION ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No VERSION file -- skipping auto-version"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        if: steps.check.outputs.skip == 'false'
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
          DISPATCH_BUMP: ${{ inputs.bump || '' }}
        run: |
          if [ -n "$DISPATCH_BUMP" ]; then
            echo "type=$DISPATCH_BUMP" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          if ! echo "$CURRENT" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping auto-version for non-stable VERSION: $CURRENT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ steps.bump.outputs.type }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *) echo "Unknown bump type: $BUMP" >&2; exit 1 ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "$NEW" > VERSION
          if [ -f scripts/mae ]; then
            perl -0pi -e "s/MAE_VERSION=\"[^\"]+\"/MAE_VERSION=\"$NEW\"/" scripts/mae
          fi
          if [ -f README.md ]; then
            perl -0pi -e "s/Current stable release: \*\*v[0-9]+\.[0-9]+\.[0-9]+\*\*\./Current stable release: **v$NEW**./" README.md
          fi
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumped $CURRENT → $NEW ($BUMP)"

      - name: Commit, tag, and push version bump
        if: steps.check.outputs.skip == 'false' && steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git add VERSION scripts/mae README.md
          git commit -m "chore(release): v${VERSION}"
          git pull --rebase origin main
          git push origin main

          git tag -a -m "v${VERSION}" "v${VERSION}"
          git push origin "v${VERSION}"
          echo "Released v${VERSION}"

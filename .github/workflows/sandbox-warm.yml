name: Sandbox Warm (Nightly)

on:
  schedule:
    - cron: "0 7 * * *"  # 3 AM EDT
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    name: Update sandbox repos & deps
    runs-on: [self-hosted, mae]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Ansible
        run: pip install ansible --break-system-packages 2>/dev/null || pip install ansible

      - name: Write inventory
        run: |
          cat > /tmp/sandbox-inventory.yml << EOF
          all:
            children:
              sandboxes:
                hosts:
                  sandbox-template:
                    ansible_host: 10.71.1.230
                    ansible_user: mae
                    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          EOF

      - name: Update repos
        run: |
          ansible sandboxes -i /tmp/sandbox-inventory.yml -m shell -a "
            export PATH=\$PATH:/usr/local/go/bin:/usr/local/bin
            cd ~/repos
            for d in */; do
              echo \"Updating \$d...\"
              cd ~/repos/\$d
              git fetch origin main --depth=1 2>/dev/null
              git reset --hard origin/main 2>/dev/null
              cd ~/repos
            done
          "

      - name: Refresh MAE deps
        run: |
          ansible sandboxes -i /tmp/sandbox-inventory.yml -m shell -a "
            export PATH=\$PATH:/usr/local/go/bin:/usr/local/bin
            cd ~/repos/multi-agent-engine && bun install 2>/dev/null
            cd ~/repos/multi-agent-engine/dashboard && go mod download 2>/dev/null
          "

      - name: Check tool versions
        run: |
          ansible sandboxes -i /tmp/sandbox-inventory.yml -m shell -a "
            echo 'Node:' \$(node --version)
            echo 'Bun:' \$(bun --version)
            echo 'Go:' \$(go version 2>/dev/null || echo 'not found')
            echo 'GH:' \$(gh --version 2>/dev/null | head -1 || echo 'not found')
            echo 'Claude:' \$(claude --version 2>/dev/null || echo 'not found')
            echo 'Repos:' \$(ls ~/repos | wc -l)
          "

name: Sandbox Warm (Nightly)

on:
  schedule:
    - cron: "0 7 * * *"  # 3 AM EDT
  workflow_dispatch:
    inputs:
      targets:
        description: 'Comma-separated IPs to warm (default: golden only)'
        required: false
        default: '10.71.20.169'

permissions:
  contents: read

jobs:
  warm:
    name: Update sandbox repos & deps
    runs-on: [self-hosted, mae]
    strategy:
      matrix:
        target: ${{ fromJSON(format('["{0}"]', inputs.targets || '10.71.20.169')) }}
    steps:
      - name: "🔄 Pull repos on ${{ matrix.target }}"
        run: |
          set -euo pipefail
          IP="${{ matrix.target }}"

          echo "::group::Connectivity"
          ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no mae@$IP "hostname" || {
            echo "❌ Cannot reach $IP"
            exit 1
          }
          echo "::endgroup::"

          echo "::group::Git pull all repos"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            cd ~/Development/King-Capital
            for d in */; do
              echo -n \"\$d: \"
              cd ~/Development/King-Capital/\$d
              git fetch origin main --depth=1 2>/dev/null
              git reset --hard origin/main 2>/dev/null && echo 'updated' || echo 'failed'
              cd ~/Development/King-Capital
            done
          "
          echo "::endgroup::"

          echo "::group::Refresh deps"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            source ~/.zshrc 2>/dev/null
            cd ~/Development/King-Capital/multi-agent-engine/engine && bun install 2>&1 | tail -1
            cd ~/Development/King-Capital/multi-agent-engine/dashboard && /usr/local/go/bin/go mod download 2>&1
            cd ~/Development/King-Capital/king-core && bun install 2>&1 | tail -1
            cd ~/Development/King-Capital/bulkbridge-ai && bun install 2>&1 | tail -1
            cd ~/Development/King-Capital/bb-client-app && bun install 2>&1 | tail -1
          "
          echo "::endgroup::"

          echo "::group::Status"
          ssh -o StrictHostKeyChecking=no mae@$IP "
            echo 'Node:' \$(node --version)
            echo 'Bun:' \$(bun --version)
            echo 'Go:' \$(/usr/local/go/bin/go version)
            echo 'Repos:' \$(ls ~/Development/King-Capital | wc -l)
            echo 'Disk:' \$(df -h / | tail -1 | awk '{print \$3 \" / \" \$2 \" (\" \$5 \")\"}')
          "
          echo "::endgroup::"

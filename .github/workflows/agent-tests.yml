name: Engine Tests

on:
  push:
    paths:
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'
  pull_request:
    paths:
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies
        working-directory: engine
        run: bun install

      - name: Type check
        working-directory: engine
        run: bunx tsc --noEmit

      - name: Run tests
        working-directory: engine
        run: bun test

      - name: Verify configs load
        working-directory: engine
        run: bun cli.ts adapters

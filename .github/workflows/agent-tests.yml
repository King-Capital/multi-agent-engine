name: Agent Engine Tests

on:
  push:
    paths:
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'
  pull_request:
    paths:
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: extractions/setup-just@v2

      - name: Install dependencies
        working-directory: engine
        run: bun install

      - name: Run security + integration tests
        run: just test

      - name: Verify all configs load
        run: |
          just teams > /dev/null
          just chains > /dev/null
          just prompts > /dev/null
          just adapters

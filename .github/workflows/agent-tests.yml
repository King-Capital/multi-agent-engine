name: Engine Tests

on:
  push:
    paths:
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'
  pull_request:
    paths:
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'

jobs:
  test:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        working-directory: engine
        run: bun install

      - name: Type check
        working-directory: engine
        run: bunx tsc --noEmit

      - name: Run tests
        working-directory: engine
        run: bun test

      - name: Verify configs load
        run: |
          cd engine && bun cli.ts adapters

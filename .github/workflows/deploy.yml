name: Deploy Engine

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'
      - 'prompts/**'
      - 'library.yaml'

permissions:
  contents: read

concurrency:
  group: mae-deploy-engine
  cancel-in-progress: false

jobs:
  test:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install engine dependencies
        working-directory: engine
        run: bun install

      - name: Engine type check
        working-directory: engine
        run: bunx tsc --noEmit

      - name: Engine tests
        working-directory: engine
        run: bun test

  deploy:
    needs: test
    runs-on: [self-hosted, mae]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync engine + configs
        run: |
          rsync -a --delete engine/ /opt/mae/engine/
          rsync -a --delete agents/ /opt/mae/agents/
          rsync -a --delete configs/ /opt/mae/configs/
          rsync -a prompts/ /opt/mae/prompts/ 2>/dev/null || true
          cp -f library.yaml /opt/mae/library.yaml 2>/dev/null || true

      - name: Install engine dependencies
        run: cd /opt/mae/engine && bun install

      - name: Health check
        run: |
          curl -sf http://localhost:8400/api/health > /dev/null
          echo "Engine deployed, dashboard healthy"

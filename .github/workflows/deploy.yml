name: Deploy Engine

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy.yml'
      - 'engine/**'
      - 'agents/**'
      - 'configs/**'
      - 'prompts/**'
      - 'library.yaml'

permissions:
  contents: read

concurrency:
  group: mae-deploy-engine
  cancel-in-progress: false

jobs:
  test:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install engine dependencies
        working-directory: engine
        run: bun install

      - name: Engine type check
        working-directory: engine
        run: bunx tsc --noEmit

      - name: Engine tests
        working-directory: engine
        run: bun test

  deploy:
    needs: test
    runs-on: [self-hosted, mae]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync engine + configs
        run: |
          rsync -a --delete engine/ /opt/mae/engine/
          rsync -a --delete agents/ /opt/mae/agents/
          rsync -a --delete configs/ /opt/mae/configs/
          rsync -a prompts/ /opt/mae/prompts/ 2>/dev/null || true
          cp -f library.yaml /opt/mae/library.yaml 2>/dev/null || true
          cp -f VERSION /opt/mae/VERSION 2>/dev/null || true

      - name: Install engine dependencies
        run: cd /opt/mae/engine && bun install

      - name: Build engine CLI
        run: cd /opt/mae/engine && bun build cli.ts --target=bun --outfile=../agent

      - name: Configure engine runtime env
        run: |
          set -euo pipefail

          DB_URL="${DATABASE_URL:-postgres://mae:mae@localhost:5432/mae?sslmode=disable}"
          TOKEN="$(psql "$DB_URL" -tAc "SELECT api_token FROM users WHERE username = 'skippy' AND api_token IS NOT NULL LIMIT 1")"
          if [ -z "$TOKEN" ]; then
            TOKEN="$(psql "$DB_URL" -tAc "SELECT api_token FROM users WHERE role = 'agent' AND api_token IS NOT NULL ORDER BY id LIMIT 1")"
          fi
          if [ -z "$TOKEN" ]; then
            TOKEN="$(psql "$DB_URL" -tAc "SELECT api_token FROM users WHERE api_token IS NOT NULL ORDER BY id LIMIT 1")"
          fi
          if [ -z "$TOKEN" ]; then
            echo "No dashboard API token available for engine runtime" >&2
            exit 1
          fi

          install -d -m 0775 /opt/mae/data /opt/mae/data/pipelines

          tmp_env="$(mktemp)"
          {
            echo "MAE_ROOT=/opt/mae"
            echo "MAE_DASHBOARD_URL=http://localhost:8400"
            printf 'MAE_API_TOKEN=%s\n' "$TOKEN"
          } > "$tmp_env"
          install -m 0600 "$tmp_env" /opt/mae/.env
          rm -f "$tmp_env"

      - name: Health check
        run: |
          curl -sf http://localhost:8400/api/health > /dev/null
          echo "Engine deployed, dashboard healthy"

name: Deploy MAE

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'dashboard/**'
      - 'agents/**'
      - 'configs/**'
      - 'deploy/**'
      - 'library.yaml'

permissions:
  contents: read

concurrency:
  group: mae-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: [self-hosted, mae]
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install engine dependencies
        working-directory: engine
        run: bun install

      - name: Engine type check
        working-directory: engine
        run: bunx tsc --noEmit

      - name: Engine tests
        working-directory: engine
        run: bun test

      - name: Generate templ
        working-directory: dashboard
        run: templ generate ./templates/

      - name: Dashboard build check
        working-directory: dashboard
        run: go build -o mae-dashboard .

      - name: Dashboard vet
        working-directory: dashboard
        run: go vet ./...

  deploy:
    needs: test
    runs-on: [self-hosted, mae]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Sync to /opt/mae
        run: |
          rsync -a --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dashboard/mae-dashboard' \
            --exclude='dashboard/data' \
            ./ /opt/mae/

      - name: Install engine dependencies
        run: cd /opt/mae/engine && bun install

      - name: Run migrations
        run: sudo -u postgres psql -d mae -f /opt/mae/dashboard/migrations/001_initial.sql 2>/dev/null || true

      - name: Build dashboard
        run: cd /opt/mae/dashboard && templ generate ./templates/ && go build -o mae-dashboard .

      - name: Set ownership
        run: chown -R mae:mae /opt/mae

      - name: Restart dashboard
        run: |
          systemctl restart mae-dashboard
          sleep 2
          systemctl is-active mae-dashboard

      - name: Health check
        run: |
          curl -sf http://localhost:8400/api/health > /dev/null
          echo "Dashboard healthy"
